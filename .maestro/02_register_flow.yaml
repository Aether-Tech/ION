appId: com.aether.ion.app
---
# Teste: Fluxo de Cadastro
# Verifica que o cadastro funciona sem crashes e sem navegação travada.

- launchApp:
    clearState: true

# Welcome screen
- assertVisible: "ION"

# Ir para tela de cadastro (via botão na welcome ou login)
- tapOn: "Entrar"
- tapOn: "Criar uma conta"

# Tela de cadastro
- assertVisible: "Criar conta"
- assertVisible: "Nome completo"

# Preencher formulário com dados únicos (timestamp no email para evitar conflito)
- tapOn: "Ex: Maria Silva"
- inputText: "Usuário Teste"

- tapOn: "Ex: maria@email.com"
- inputText: "teste_maestro@ionapp.ai"

- tapOn: "Mínimo 6 caracteres"
- inputText: "Teste@123"

- tapOn: "Digite a senha novamente"
- inputText: "Teste@123"

- hideKeyboard

# Tentar criar conta
- tapOn: "Criar conta"

# Aguardar processamento
- waitForAnimationToEnd:
    timeout: 15000

# Deve mostrar feedback de sucesso ou erro sem crash
# (email já pode existir - o fluxo deve tratar isso graciosamente)
- assertNotVisible: "Criar conta"
    optional: true
